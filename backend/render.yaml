services:
  - type: web
    name: adaptive-engine-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: adaptive_engine
      - key: GROQ_API_KEY
        sync: false